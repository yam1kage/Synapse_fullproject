services:
  db:
    image: postgres:16-alpine
    container_name: synapse_db
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: synapse_db
    volumes:
      - postgres_data:/var/lib/postgresql/data


  backend:
    build: ./synapse_backend
    container_name: synapse_backend
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@db:5432/synapse_db
    depends_on:
      - db


  frontend:
    build: ./synapse_frontend
    container_name: synapse_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data: